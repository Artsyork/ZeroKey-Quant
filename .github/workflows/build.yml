name: Build & Release

# v로 시작하는 태그 push 시 자동 실행 (예: git tag v1.0.0 && git push origin v1.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask yfinance pandas numpy plotly requests pytz pyinstaller

      - name: Build .app
        run: |
          pyinstaller \
            --name "ZeroKey Quant" \
            --windowed \
            --add-data "landing.html:." \
            --add-data "dashboard.html:." \
            --hidden-import flask \
            --hidden-import werkzeug \
            --hidden-import jinja2 \
            --hidden-import yfinance \
            --hidden-import plotly \
            --hidden-import pytz \
            --noconfirm \
            main.py

      - name: Zip .app
        run: |
          cd dist
          zip -r "ZeroKey-Quant-mac.zip" "ZeroKey Quant.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/ZeroKey-Quant-mac.zip

  build-windows:
    name: Build Windows Exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask yfinance pandas numpy plotly requests pytz pyinstaller

      - name: Build .exe
        run: |
          pyinstaller `
            --name "ZeroKey Quant" `
            --windowed `
            --add-data "landing.html;." `
            --add-data "dashboard.html;." `
            --hidden-import flask `
            --hidden-import werkzeug `
            --hidden-import jinja2 `
            --hidden-import yfinance `
            --hidden-import plotly `
            --hidden-import pytz `
            --noconfirm `
            main.py

      - name: Zip exe folder
        run: |
          cd dist
          Compress-Archive -Path "ZeroKey Quant" -DestinationPath "ZeroKey-Quant-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/ZeroKey-Quant-windows.zip

  release:
    name: Create GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ZeroKey Quant ${{ github.ref_name }}"
          body: |
            ## ZeroKey Quant ${{ github.ref_name }}

            ### 설치 방법

            **Mac**
            1. `ZeroKey-Quant-mac.zip` 다운로드 후 압축 해제
            2. `ZeroKey Quant.app` 을 응용 프로그램 폴더로 이동
            3. 처음 실행 시: 우클릭 → 열기 → 열기

            **Windows**
            1. `ZeroKey-Quant-windows.zip` 다운로드 후 압축 해제
            2. `ZeroKey Quant` 폴더 안의 `ZeroKey Quant.exe` 실행

            > API 키 없이도 모든 기술적 분석 기능 사용 가능
          files: |
            mac-build/ZeroKey-Quant-mac.zip
            windows-build/ZeroKey-Quant-windows.zip
          draft: false
          prerelease: false
